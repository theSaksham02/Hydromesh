services:
  - type: web
    name: hydromesh-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: WEATHER_API_URL
        value: https://api.open-meteo.com/v1
      # Supabase REST API (HTTPS/IPv4) — set these in Render Environment tab:
      # SUPABASE_URL = https://zllbvvgufhhhktaxlpqp.supabase.co
      # SUPABASE_SERVICE_KEY = (from Supabase Dashboard → Settings → API → service_role key)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # DATABASE_URL is optional — only needed for direct pg mode (local dev)
      # If SUPABASE_URL + SUPABASE_SERVICE_KEY are set, REST API is used instead
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
